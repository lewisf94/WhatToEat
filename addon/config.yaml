name: EatMe
slug: eatme
version: "0.4.0"
description: Food inventory for jars, spices and the back of the cupboard
url: https://github.com/lewisf94/EatMe
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
# Optional LAN port — used by the e-ink display (P6) and for local access.
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: EatMe web/API (LAN + e-ink display)
webui: "http://[HOST]:[PORT:8099]"
watchdog: "http://[HOST]:[PORT:8099]/api/health"
# /data is persisted and included in Home Assistant backups.
map:
  - type: data
    read_only: false
options:
  auth_token: ""
  tailscale_authkey: ""
  tailscale_hostname: eatme
schema:
  auth_token: str?
  tailscale_authkey: password?
  tailscale_hostname: str?
