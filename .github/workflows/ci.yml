name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: check + unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24] # 22 = sandbox floor (node:sqlite experimental), 24 = target (stable)
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check # tsc across packages + prettier
      - run: pnpm test # vitest (shared status/OFF logic)

  e2e:
    name: browser e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Install the browser matching this @playwright/test version (+ system libs).
      - run: pnpm --filter @whattoeat/e2e exec playwright install --with-deps chromium
      # The e2e script builds the web PWA, then Playwright boots the server
      # (with and without the auth token) and drives the real app.
      - run: pnpm --filter @whattoeat/e2e run e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  docker:
    name: add-on image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build context is the repo root (see addon/Dockerfile); this is a smoke
      # test that the Home Assistant add-on image still assembles.
      - run: docker build -f addon/Dockerfile -t whattoeat-addon:ci .
